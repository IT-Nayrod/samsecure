name: Deploy DEV (self-hosted)

on:
  push:
    branches:
      - develop
  workflow_dispatch: {}  # déclenchement manuel possible

jobs:
  deploy-dev:
    # Runner self-hosted avec label samsecure
    runs-on: [self-hosted, samsecure]

    # Environnement GitHub (optionnel mais recommandé)
    environment:
      name: development
      url: https://dev-samsecure.nayrod.fr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optionnel : si tu veux forcer une version de Node
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build Vite app
        run: |
          npm run build

      - name: Prepare target directory
        run: |
          # On s'assure que le dossier de déploiement existe
          mkdir -p /var/www/samsecure/dev/dist

      - name: Deploy build to DEV
        run: |
          # On copie le contenu du dist local vers le dist du serveur
          rsync -av --delete ./dist/ /var/www/samsecure/dev/dist/

      - name: Show deployed files (DEV)
        run: |
          ls -lah /var/www/samsecure/dev/dist
