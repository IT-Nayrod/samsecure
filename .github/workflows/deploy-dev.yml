name: Deploy DEV (self-hosted)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: [self-hosted, samsecure]

    defaults:
      run:
        working-directory: ./dev

    environment:
      name: development
      url: https://dev-samsecure.nayrod.fr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: |
          pwd
          ls -lah
          find . -maxdepth 2 -type f \( -name "package.json" -o -name "package-lock.json" \)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./dev/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Prepare target directory
        working-directory: .
        run: mkdir -p /var/www/samsecure/dev/dist

      - name: Deploy build to DEV
        run: rsync -av --delete ./dist/ /var/www/samsecure/dev/dist/

      - name: Show deployed files
        working-directory: .
        run: ls -lah /var/www/samsecure/dev/dist
