name: Deploy DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: [self-hosted, samsecure]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync app source to server
        run: |
          mkdir -p /var/www/samsecure/
          rsync -rt --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            ./ /var/www/samsecure/

      - name: Install dependencies
        working-directory: /var/www/samsecure
        run: npm ci

      - name: Restart PM2 dev server
        working-directory: /var/www/samsecure
        run: |
          pm2 describe samsecure-dev > /dev/null 2>&1 \
            && pm2 restart samsecure-dev \
            || pm2 start ecosystem.config.cjs

      - name: Save PM2 process list
        run: pm2 save
