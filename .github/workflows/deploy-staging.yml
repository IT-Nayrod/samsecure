name: Deploy STAGING

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: [self-hosted, samsecure]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync app source to server
        run: |
          mkdir -p /var/www/samsecure/app
          mkdir -p /var/www/samsecure/staging-dist
          rsync -rt --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            ./ /var/www/samsecure/app/

      - name: Install dependencies
        working-directory: /var/www/samsecure/app
        run: npm ci

      - name: Build staging
        working-directory: /var/www/samsecure/app
        run: npm run build:staging
