*{box-sizing:border-box;margin:0;padding:0}
#uml-root{font-family:system-ui,sans-serif;background:transparent}

.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#999}

<div id="uml-root">

let cx=40;
layout.forEach((col,colIdx)=>{
  if(colIdx === COMMUNE_COLS) cx += SEPARATOR_W; // gap between commune and tenant
  let cy=60; // leave room for zone labels

    const h=HDR_H+t.c.length*ROW_H;

let tr={x:0,y:0,s:1};
function applyTransform(){svg.style.transform=`translate(${tr.x}px,${tr.y}px) scale(${tr.s})`; svg.style.transformOrigin='0 0';}
function zoomIn(){tr.s=Math.min(tr.s*1.2,3);applyTransform();}
function zoomOut(){tr.s=Math.max(tr.s/1.2,0.15);applyTransform();}
function resetView(){tr={x:0,y:0,s:1};applyTransform();}
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1;const ns=Math.max(0.15,Math.min(tr.s*d,3));const r=wrap.getBoundingClientRect();const mx=e.clientX-r.left;const my=e.clientY-r.top;tr.x=mx-(mx-tr.x)*(ns/tr.s);tr.y=my-(my-tr.y)*(ns/tr.s);tr.s=ns;applyTransform();},{passive:false});
let panning=false,px,py;
wrap.addEventListener('mousedown',e=>{if(e.button===0&&e.shiftKey||e.button===1||e.button===0&&e.target===wrap||e.button===0&&spaceDown){panning=true;px=e.clientX-tr.x;py=e.clientY-tr.y;wrap.classList.add('panning');e.preventDefault();}});
window.addEventListener('mousemove',e=>{if(!panning)return;tr.x=e.clientX-px;tr.y=e.clientY-py;applyTransform();});
window.addEventListener('mouseup',()=>{panning=false;wrap.classList.remove('panning');});
let spaceDown=false;
window.addEventListener('keydown',e=>{if(e.code==='Space'){spaceDown=true;e.preventDefault();}});
window.addEventListener('keyup',e=>{if(e.code==='Space')spaceDown=false;});

let filter='all';
function buildSVG(f){
  filter=f||'all';
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);
  defs.innerHTML=`<marker id="m-c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${COLOR.relCommune}" stroke-width="1.5" stroke-linecap="round"/></marker><marker id="m-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${COLOR.relTenant}" stroke-width="1.5" stroke-linecap="round"/></marker><marker id="m-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${COLOR.relBoth}" stroke-width="1.5" stroke-linecap="round"/></marker><marker id="m-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${COLOR.relMix}" stroke-width="1.5" stroke-linecap="round"/></marker>`;

  // Zone labels (text only, no backgrounds)
  const communeMaxX = 40 + COMMUNE_COLS * (TW + GAP_X);
  const tenantStartX = communeMaxX + SEPARATOR_W;

  const labelC = document.createElementNS('http://www.w3.org/2000/svg','text');
  labelC.setAttribute('x','44');labelC.setAttribute('y','50');
  labelC.setAttribute('font-size','13');labelC.setAttribute('font-weight','bold');
  labelC.setAttribute('fill', COLOR.communeTitle);labelC.setAttribute('font-family','system-ui,sans-serif');
  labelC.textContent='BDD Commune (lecture seule, préfixe default_)';
  if(f!=='tenant') svg.appendChild(labelC);

  const labelT = document.createElementNS('http://www.w3.org/2000/svg','text');
  labelT.setAttribute('x', String(tenantStartX + 4));labelT.setAttribute('y','50');
  labelT.setAttribute('font-size','13');labelT.setAttribute('font-weight','bold');
  labelT.setAttribute('fill', COLOR.tenantTitle);labelT.setAttribute('font-family','system-ui,sans-serif');
  labelT.textContent='BDD Tenant (par client, préfixe tenant_)';
  if(f!=='commune') svg.appendChild(labelT);

  // Relations
  const root=document.createElementNS('http://www.w3.org/2000/svg','g');
  root.id='rg'; svg.appendChild(root);
  const relG=document.createElementNS('http://www.w3.org/2000/svg','g');
  root.appendChild(relG);

  relations.forEach(([t1,t2])=>{
    if(!positions[t1]||!positions[t2]) return;
    const s1=tables[t1]?.s, s2=tables[t2]?.s;
    if(f==='commune'&&s1==='tenant'&&s2==='tenant') return;
    if(f==='tenant'&&s1==='commune'&&s2==='commune') return;
    if(f==='shared'&&!t1.startsWith('d_')&&!t1.startsWith('t_')&&!t2.startsWith('d_')&&!t2.startsWith('t_')) return;
    const p1=positions[t1], p2=positions[t2];
    const fromRight=p1.x<p2.x;
    const sx=fromRight?p1.x+p1.w:p1.x, ex=fromRight?p2.x:p2.x+p2.w;
    const sy=p1.y+p1.h/2, ey=p2.y+p2.h/2;
    const mx=(sx+ex)/2;
    const isMix=s1!==s2;
    const col=isMix?COLOR.relMix:(s1==='commune'?COLOR.relCommune:COLOR.relTenant);
    const mid=isMix?'m-m':(s1==='commune'?'m-c':'m-t');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',col);
    path.setAttribute('stroke-width','0.8');
    path.setAttribute('opacity','0.3');
    path.setAttribute('marker-end',`url(#${mid})`);
    // Dashed line for fallback relations (default_ → tenant_)
    if((t1.startsWith('d_')&&t2.startsWith('t_'))||(t2.startsWith('d_')&&t1.startsWith('t_'))) {
      path.setAttribute('stroke-dasharray','6,4');
      path.setAttribute('opacity','0.5');
    }
    path.dataset.t1=t1;
    path.dataset.t2=t2;
    relG.appendChild(path);
  });

  // Tables
  Object.entries(positions).forEach(([name,pos])=>{
    const t=tables[name]; if(!t) return;
    if(f==='commune'&&t.s==='tenant') return;
    if(f==='tenant'&&t.s==='commune') return;
    if(f==='shared'&&!name.startsWith('d_')&&!name.startsWith('t_')) return;
    const isC=t.s==='commune';
    const bord=isC?COLOR.communeBorder:COLOR.tenantBorder;
    const hdr=isC?COLOR.communeHeader:COLOR.tenantHeader;
    const title=isC?COLOR.communeTitle:COLOR.tenantTitle;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.dataset.tbl=name;

    // Shadow
    const sh=document.createElementNS('http://www.w3.org/2000/svg','rect');
    sh.setAttribute('x',pos.x+3);sh.setAttribute('y',pos.y+3);sh.setAttribute('width',pos.w);sh.setAttribute('height',pos.h);
    sh.setAttribute('rx','5');sh.setAttribute('fill',IS_DARK?'#000':'#c0c0c0');sh.setAttribute('opacity','0.1');
    g.appendChild(sh);

    // Body
    const body=document.createElementNS('http://www.w3.org/2000/svg','rect');
    body.setAttribute('x',pos.x);body.setAttribute('y',pos.y);body.setAttribute('width',pos.w);body.setAttribute('height',pos.h);
    body.setAttribute('rx','5');body.setAttribute('fill',COLOR.tableBg);
    body.setAttribute('stroke',bord);body.setAttribute('stroke-width','0.5');
    g.appendChild(body);

    // Header
    const hdrRect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    hdrRect.setAttribute('x',pos.x);hdrRect.setAttribute('y',pos.y);hdrRect.setAttribute('width',pos.w);hdrRect.setAttribute('height',HDR_H);
    hdrRect.setAttribute('rx','5');hdrRect.setAttribute('fill',hdr);
    hdrRect.setAttribute('stroke',bord);hdrRect.setAttribute('stroke-width','0.5');
    g.appendChild(hdrRect);

    // Clip bottom corners of header
    const hdrClip=document.createElementNS('http://www.w3.org/2000/svg','rect');
    hdrClip.setAttribute('x',pos.x);hdrClip.setAttribute('y',pos.y+HDR_H-5);hdrClip.setAttribute('width',pos.w);hdrClip.setAttribute('height',5);
    hdrClip.setAttribute('fill',hdr);
    g.appendChild(hdrClip);

    // Title text
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',pos.x+PAD);txt.setAttribute('y',pos.y+HDR_H/2+5);
    txt.setAttribute('font-size','10');txt.setAttribute('font-weight','bold');txt.setAttribute('fill',title);
    txt.setAttribute('font-family','system-ui,sans-serif');
    const displayName = name.startsWith('d_') ? 'default_'+name.slice(2) : (name.startsWith('t_') ? 'tenant_'+name.slice(2) : name);
    txt.textContent=displayName;
    g.appendChild(txt);

    // BDD badge
    const badgeTxt = isC ? 'C' : 'T';
    const badgeW = 18;
    const badgeX = pos.x + pos.w - badgeW - 6;
    const badgeRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    badgeRect.setAttribute('x', badgeX);badgeRect.setAttribute('y', pos.y+8);
    badgeRect.setAttribute('width', badgeW);badgeRect.setAttribute('height', 14);
    badgeRect.setAttribute('rx','3');badgeRect.setAttribute('fill', bord);badgeRect.setAttribute('opacity','0.2');
    g.appendChild(badgeRect);
    const badgeLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
    badgeLabel.setAttribute('x', badgeX + badgeW/2);badgeLabel.setAttribute('y', pos.y+18);
    badgeLabel.setAttribute('font-size','8');badgeLabel.setAttribute('font-weight','bold');
    badgeLabel.setAttribute('fill', title);badgeLabel.setAttribute('text-anchor','middle');
    badgeLabel.setAttribute('font-family','system-ui,sans-serif');
    badgeLabel.textContent = badgeTxt;
    g.appendChild(badgeLabel);

    // Columns
    t.c.forEach((col,i)=>{
      const ry=pos.y+HDR_H+i*ROW_H;
      const rowBg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rowBg.setAttribute('x',pos.x+1);rowBg.setAttribute('y',ry);rowBg.setAttribute('width',pos.w-2);rowBg.setAttribute('height',ROW_H);
      rowBg.setAttribute('fill',i%2===0?COLOR.rowBg0:COLOR.rowBg1);
      g.appendChild(rowBg);
      if(i>0){
        const sep=document.createElementNS('http://www.w3.org/2000/svg','line');
        sep.setAttribute('x1',pos.x+6);sep.setAttribute('y1',ry);sep.setAttribute('x2',pos.x+pos.w-6);sep.setAttribute('y2',ry);
        sep.setAttribute('stroke',COLOR.rowBorder);sep.setAttribute('stroke-width','0.5');
        g.appendChild(sep);
      }
      // Key badge
      if(col.k){
        const isPK=col.k==='PK';
        const kx=pos.x+PAD;
        const kr=document.createElementNS('http://www.w3.org/2000/svg','rect');
        kr.setAttribute('x',kx);kr.setAttribute('y',ry+4);kr.setAttribute('width',22);kr.setAttribute('height',13);
        kr.setAttribute('rx','3');kr.setAttribute('fill',isPK?COLOR.pkBg:COLOR.fkBg);
        g.appendChild(kr);
        const kt=document.createElementNS('http://www.w3.org/2000/svg','text');
        kt.setAttribute('x',kx+11);kt.setAttribute('y',ry+14);kt.setAttribute('text-anchor','middle');
        kt.setAttribute('font-size','8');kt.setAttribute('font-weight','bold');kt.setAttribute('fill',isPK?COLOR.pkColor:COLOR.fkColor);
        kt.setAttribute('font-family','system-ui,sans-serif');
        kt.textContent=col.k;
        g.appendChild(kt);
      }
      // Col name
      const cx2=pos.x+PAD+(col.k?26:0);
      const cn=document.createElementNS('http://www.w3.org/2000/svg','text');
      cn.setAttribute('x',cx2);cn.setAttribute('y',ry+14);
      cn.setAttribute('font-size','10');cn.setAttribute('fill',COLOR.colName);
      cn.setAttribute('font-family','system-ui,sans-serif');
      cn.textContent=col.n;
      g.appendChild(cn);
      // Col type
      const ct=document.createElementNS('http://www.w3.org/2000/svg','text');
      ct.setAttribute('x',pos.x+pos.w-PAD);ct.setAttribute('y',ry+14);ct.setAttribute('text-anchor','end');
      ct.setAttribute('font-size','9');ct.setAttribute('fill',COLOR.colType);
      ct.setAttribute('font-family','system-ui,sans-serif');
      ct.textContent=col.t;
      g.appendChild(ct);
    });

    // Outer border (clean corners)
    const outer=document.createElementNS('http://www.w3.org/2000/svg','rect');
    outer.setAttribute('x',pos.x);outer.setAttribute('y',pos.y);outer.setAttribute('width',pos.w);outer.setAttribute('height',pos.h);
    outer.setAttribute('rx','5');outer.setAttribute('fill','none');
    outer.setAttribute('stroke',bord);outer.setAttribute('stroke-width','0.5');
    g.appendChild(outer);

    svg.appendChild(g);
  });
}

buildSVG('all');

// Tooltip
const ttip=document.getElementById('ttip');
let ttipTarget=null;
svg.addEventListener('mousemove',e=>{
  const g=e.target.closest('g[data-tbl]');
  if(!g){
    if(ttipTarget){ttip.style.display='none';ttipTarget=null;clearHighlight();}
    return;
  }
  const n=g.dataset.tbl;
  if(n!==ttipTarget){
    ttipTarget=n;
    const d=descriptions[n]||'';
    const t=tables[n];
    const displayN = n.startsWith('d_') ? 'default_'+n.slice(2) : (n.startsWith('t_') ? 'tenant_'+n.slice(2) : n);
    const cat=t.s==='commune'?'BDD Commune':'BDD Tenant';
    const catColor=t.s==='commune'?'#7ec8f8':'#6ed4a0';
    const catBg=t.s==='commune'?'#0d2d50':'#0d2d1a';
    let nameInfo = `<strong style="display:block;margin-bottom:3px">${displayN}</strong>`;
    if(n.startsWith('d_')) nameInfo += `<span style="display:block;font-size:9px;color:#aaa;margin-bottom:3px">Surcharge tenant : tenant_${n.slice(2)}</span>`;
    if(n.startsWith('t_')) nameInfo += `<span style="display:block;font-size:9px;color:#aaa;margin-bottom:3px">Valeurs par défaut : default_${n.slice(2)}</span>`;
    ttip.innerHTML=`${nameInfo}<span style="display:inline-block;font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px;background:${catBg};color:${catColor};margin-bottom:5px">${cat}</span><br>${d}`;
    ttip.style.display='block';
    highlightTable(n);
  }
  const r=wrap.getBoundingClientRect();
  let tx=e.clientX-r.left+14, ty=e.clientY-r.top+14;
  if(tx+240>r.width) tx=e.clientX-r.left-250;
  ttip.style.left=tx+'px';ttip.style.top=ty+'px';
});
svg.addEventListener('mouseleave', () => {
  ttip.style.display='none';ttipTarget=null;clearHighlight();
});

function highlightTable(name) {
  const relPaths = svg.querySelectorAll('#rg path[data-t1]');
  const allGroups = svg.querySelectorAll('g[data-tbl]');
  const linked = new Set([name]);
  relPaths.forEach(path => {
    const t1 = path.dataset.t1, t2 = path.dataset.t2;
    if (t1 === name) linked.add(t2);
    if (t2 === name) linked.add(t1);
  });
  allGroups.forEach(g => {
    g.style.opacity = linked.has(g.dataset.tbl) ? '1' : '0.15';
  });
  relPaths.forEach(path => {
    const t1 = path.dataset.t1, t2 = path.dataset.t2;
    const isLinked = t1 === name || t2 === name;
    if (isLinked) {
      const s1 = tables[t1]?.s, s2 = tables[t2]?.s;
      const isMix = s1 !== s2;
      const col = isMix ? COLOR.relMix : (s1 === 'commune' ? COLOR.relCommune : COLOR.relTenant);
      path.setAttribute('stroke', col);
      path.setAttribute('stroke-width', '2');
      path.setAttribute('opacity', '0.9');
    } else {
      path.setAttribute('opacity', '0.04');
    }
  });
}

function clearHighlight() {
  svg.querySelectorAll('g[data-tbl]').forEach(g => g.style.opacity = '1');
  svg.querySelectorAll('#rg path[data-t1]').forEach(path => {
    path.setAttribute('stroke-width', '0.8');
    path.setAttribute('opacity', '0.3');
  });
}

function setFilter(f,btn){
  document.querySelectorAll('#toolbar button').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');buildSVG(f);
}

window.zoomIn=zoomIn;window.zoomOut=zoomOut;window.resetView=resetView;window.setFilter=setFilter;
</script>
